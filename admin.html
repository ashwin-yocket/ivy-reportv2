<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yocket Elite · Admin</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500;600&display=swap');
:root{
  --gold:#C9922A;--gold-light:#E8B84B;--gold-pale:#FBF4E8;
  --ink:#1A1A1A;--mid:#5A5A5A;--light:#9A9A9A;
  --border:#E8E4DC;--bg:#FFFFFF;--bg-soft:#FAFAF8;
  --red:#C0392B;--amber:#D47A1A;--green:#1E6B3C;
  --cream:#F5F0E8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg-soft);color:var(--ink);-webkit-font-smoothing:antialiased;}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.login-box{background:var(--bg);border:1px solid var(--border);padding:48px;max-width:380px;width:100%;text-align:center;}
.login-logo{font-family:'EB Garamond',serif;font-size:22px;color:var(--ink);margin-bottom:4px;}
.login-logo span{color:var(--gold);}
.login-sub{font-size:11px;color:var(--light);letter-spacing:.1em;text-transform:uppercase;margin-bottom:32px;}
.login-input{width:100%;padding:13px 16px;font-size:15px;font-family:'Inter',sans-serif;border:1.5px solid var(--border);background:var(--bg);color:var(--ink);outline:none;border-radius:2px;margin-bottom:12px;text-align:center;letter-spacing:.1em;}
.login-input:focus{border-color:var(--gold);}
.login-btn{width:100%;background:var(--gold);color:#fff;border:none;padding:14px;font-size:14px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;border-radius:2px;}
.login-btn:hover{background:var(--gold-light);}
.login-err{font-size:13px;color:var(--red);margin-top:10px;display:none;}

/* ADMIN */
#admin-screen{display:none;}
.admin-header{background:var(--bg);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;}
.admin-logo{font-family:'EB Garamond',serif;font-size:18px;color:var(--ink);}
.admin-logo span{color:var(--gold);}
.admin-tag{font-size:10px;color:var(--light);letter-spacing:.1em;text-transform:uppercase;margin-left:10px;}
.btn-dl{background:var(--gold);color:#fff;border:none;padding:9px 20px;font-size:13px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;border-radius:2px;}
.btn-dl:hover{background:var(--gold-light);}
.btn-logout{background:none;border:1px solid var(--border);color:var(--mid);padding:9px 16px;font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;border-radius:2px;margin-left:8px;}
.admin-body{padding:28px 32px;}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:28px;}
.stat-card{background:var(--bg);border:1px solid var(--border);padding:18px;border-radius:2px;}
.stat-num{font-family:'EB Garamond',serif;font-size:34px;color:var(--ink);line-height:1;}
.stat-lbl{font-size:10px;color:var(--light);letter-spacing:.1em;text-transform:uppercase;margin-top:4px;}
.table-wrap{background:var(--bg);border:1px solid var(--border);border-radius:2px;overflow:hidden;}
.table-top{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.table-title{font-size:13px;font-weight:500;}
.search-input{padding:7px 12px;font-size:13px;font-family:'Inter',sans-serif;border:1px solid var(--border);background:var(--bg-soft);color:var(--ink);outline:none;border-radius:2px;width:220px;}
.search-input:focus{border-color:var(--gold);}
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{text-align:left;padding:9px 14px;font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--light);border-bottom:1px solid var(--border);background:var(--bg-soft);white-space:nowrap;}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--bg-soft);vertical-align:top;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--bg-soft);}
.score-pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;}
.pill-high{background:#E8F5EE;color:var(--green);}
.pill-mid{background:#FBF4E8;color:var(--amber);}
.pill-low{background:#FDEAEA;color:var(--red);}
.btn-view{background:none;border:1px solid var(--border);color:var(--mid);padding:4px 10px;font-size:11px;font-family:'Inter',sans-serif;cursor:pointer;border-radius:2px;white-space:nowrap;}
.btn-view:hover{border-color:var(--gold);color:var(--gold);}
.empty-state{padding:48px;text-align:center;color:var(--light);font-size:14px;}
.loading-state{padding:32px;text-align:center;color:var(--light);font-size:13px;}

/* MODAL */
#rpt-modal{display:none;position:fixed;inset:0;z-index:1000;background:rgba(10,10,10,.6);overflow-y:auto;padding:20px;}
.modal-inner{max-width:900px;margin:0 auto;background:var(--bg);}
.modal-bar{background:var(--bg);border-bottom:1px solid var(--border);padding:13px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.modal-title{font-size:13px;font-weight:500;color:var(--ink);}
.modal-acts{display:flex;gap:8px;}
.btn-print{background:var(--gold);color:#fff;border:none;padding:8px 18px;font-size:12px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;border-radius:2px;}
.btn-close{background:none;border:1px solid var(--border);color:var(--mid);padding:8px 14px;font-size:12px;font-family:'Inter',sans-serif;cursor:pointer;border-radius:2px;}

/* ── REPORT STYLES (exact copy from index_final) ── */
.rpt-header{background:var(--bg);border-bottom:1px solid var(--border);padding:18px 40px;display:flex;align-items:center;justify-content:space-between;}
.rpt-logo{font-family:'EB Garamond',serif;font-size:20px;color:var(--ink);}
.rpt-logo span{color:var(--gold);}
.rpt-meta{font-size:11px;color:var(--light);}
.rpt-hero{padding:44px 40px 36px;border-bottom:1px solid var(--border);max-width:900px;margin:0 auto;}
.rpt-eyebrow{font-size:9px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}
.rpt-name{font-family:'EB Garamond',serif;font-size:clamp(38px,7vw,70px);font-weight:400;color:var(--ink);line-height:1.0;margin-bottom:6px;}
.rpt-tag{font-size:13px;color:var(--mid);margin-bottom:32px;}
.hero-scores{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:28px;}
.dim-rings{display:flex;gap:20px;flex-wrap:wrap;}
.dim-ring-item{display:flex;flex-direction:column;align-items:center;gap:6px;}
.ring-wrap{width:68px;height:68px;position:relative;}
.ring-wrap svg{width:68px;height:68px;transform:rotate(-90deg);}
.ring-track{fill:none;stroke:var(--border);stroke-width:3;}
.ring-fill{fill:none;stroke:var(--gold);stroke-width:3;stroke-linecap:round;}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.ring-val{font-size:15px;font-weight:600;color:var(--ink);line-height:1;}
.ring-sub{font-size:8px;color:var(--light);letter-spacing:.04em;}
.ring-label{font-size:10px;color:var(--mid);}
.overall-box{text-align:right;}
.overall-big{font-family:'EB Garamond',serif;font-size:76px;line-height:1;color:var(--ink);}
.overall-den{font-size:12px;color:var(--light);margin-top:2px;}
.overall-verdict{font-size:11px;font-weight:600;margin-top:5px;letter-spacing:.06em;text-transform:uppercase;padding:4px 10px;border-radius:10px;display:inline-block;}
.verdict-competitive{background:#FBF4E8;color:var(--amber);}
.verdict-building{background:#FDEAEA;color:var(--red);}
.rpt-sec{max-width:900px;margin:0 auto;padding:44px 40px;border-bottom:1px solid var(--border);}
.sec-eye{font-size:9px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:7px;}
.sec-title{font-family:'EB Garamond',serif;font-size:clamp(20px,4vw,32px);font-weight:400;color:var(--ink);margin-bottom:18px;line-height:1.2;}
.sec-prose{font-size:14px;color:var(--ink);line-height:1.85;max-width:680px;}
.funnel-layout{display:grid;grid-template-columns:1fr 1fr;gap:36px;margin-top:28px;align-items:start;}
.funnel-lbl{font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--light);margin-bottom:14px;}
.f-row{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.f-arrow{font-size:10px;color:var(--border);margin:2px 0 4px 3px;}
.f-bar-wrap{flex:1;}
.f-bar-track{height:36px;background:var(--bg-soft);border:1px solid var(--border);position:relative;overflow:hidden;}
.f-bar-fill{height:100%;position:absolute;left:0;top:0;background:var(--gold);}
.f-bar-label{position:absolute;inset:0;display:flex;align-items:center;padding:0 10px;font-size:12px;color:var(--ink);font-weight:500;}
.f-num{font-size:13px;font-weight:600;color:var(--mid);min-width:32px;text-align:right;flex-shrink:0;}
.f-num.hl{color:var(--gold);}
.ctx-stats{display:flex;flex-direction:column;gap:14px;}
.ctx-stat{border:1px solid var(--border);padding:16px 18px;}
.ctx-stat-lbl{font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--light);margin-bottom:4px;}
.ctx-stat-val{font-family:'EB Garamond',serif;font-size:26px;color:var(--ink);line-height:1;margin-bottom:3px;}
.ctx-stat-desc{font-size:11px;color:var(--mid);line-height:1.5;}
.ctx-stat-warn{font-size:10px;color:var(--amber);font-style:italic;margin-top:3px;}
.scorecard-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:24px;}
.sc-item{border:1px solid var(--border);padding:18px 20px;}
.sc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.sc-name{font-family:'EB Garamond',serif;font-size:18px;color:var(--ink);}
.sc-pill{font-size:11px;font-weight:500;padding:3px 10px;border-radius:10px;}
.pill-green{background:#E8F5EE;color:var(--green);}
.pill-amber{background:#FBF4E8;color:var(--amber);}
.pill-red{background:#FDEAEA;color:var(--red);}
.pill-grey{background:#F5F5F5;color:var(--light);}
.sc-score-row{display:flex;align-items:baseline;gap:5px;margin-bottom:10px;}
.sc-score-big{font-family:'EB Garamond',serif;font-size:32px;line-height:1;}
.sc-score-den{font-size:12px;color:var(--light);}
.sc-score-need{font-size:11px;color:var(--mid);margin-left:auto;}
.sc-bar-track{height:8px;background:var(--bg-soft);border:1px solid var(--border);border-radius:4px;position:relative;overflow:visible;margin-bottom:8px;}
.sc-bar-fill{height:100%;border-radius:4px;}
.sc-bar-marker{position:absolute;top:-3px;width:2px;height:14px;background:var(--ink);opacity:.25;border-radius:1px;}
.sc-bar-marker-lbl{position:absolute;top:-20px;transform:translateX(-50%);font-size:9px;color:var(--light);white-space:nowrap;}
.sc-verdict-tag{font-size:11px;font-weight:500;padding:4px 9px;border-radius:4px;display:inline-block;margin-bottom:9px;}
.sc-prose{font-size:12px;color:var(--mid);line-height:1.7;}
.athletic-note{font-size:12px;color:var(--mid);line-height:1.6;margin-bottom:10px;padding:10px 12px;background:var(--bg-soft);border-left:2px solid var(--border);}
.counselor-card{background:var(--bg-soft);border:1px solid var(--border);padding:24px 28px;}
.counselor-eye{font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;}
.counselor-text{font-size:14px;color:var(--ink);line-height:1.85;}
.proj-tbl{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:24px;}
.proj-tbl th{text-align:left;font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--light);padding:6px 9px;border-bottom:1px solid var(--border);}
.proj-tbl td{padding:9px;border-bottom:1px solid var(--bg-soft);vertical-align:middle;}
.pb-row{display:flex;align-items:center;gap:6px;margin:2px 0;font-size:10px;color:var(--light);}
.pb-track{flex:1;height:5px;background:var(--border);border-radius:2px;overflow:hidden;}
.pb-now{height:100%;background:#C8C0B0;border-radius:2px;}
.pb-proj{height:100%;background:var(--gold);border-radius:2px;}
.pv{min-width:28px;font-size:11px;text-align:right;}
.pv.p{color:var(--gold);font-weight:600;}
.proj-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px;}
.pcol{border:1px solid var(--border);padding:20px 22px;}
.pcol-eye{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--light);margin-bottom:8px;}
.pcol.act .pcol-eye{color:var(--gold);}
.pcol-h{font-family:'EB Garamond',serif;font-size:16px;margin-bottom:8px;line-height:1.3;}
.pcol-body{font-size:12px;color:var(--mid);line-height:1.65;margin-bottom:10px;}
.plist-head{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--light);margin-bottom:6px;}
.plist{list-style:none;font-size:12px;display:flex;flex-direction:column;gap:5px;}
.plist li{display:flex;gap:7px;color:var(--mid);align-items:baseline;}
.plist-ic-g{color:var(--green);font-weight:bold;flex-shrink:0;}
.plist-ic-r{color:var(--red);flex-shrink:0;}
.parent-note{background:var(--bg-soft);border:1px solid var(--border);padding:24px 28px;}
.parent-eye{font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:4px;}
.parent-h{font-family:'EB Garamond',serif;font-size:20px;color:var(--ink);margin-bottom:12px;}
.parent-text{font-size:14px;color:var(--mid);line-height:1.85;}
.cta-section{background:var(--cream);border-top:1px solid var(--border);padding:48px 40px;text-align:center;}
.cta-eye{font-size:9px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}
.cta-h1{font-family:'EB Garamond',serif;font-size:clamp(28px,4vw,44px);font-weight:400;color:var(--ink);line-height:1.1;margin-bottom:4px;}
.cta-h2{font-family:'EB Garamond',serif;font-size:clamp(26px,3.5vw,40px);font-weight:400;font-style:italic;color:var(--gold);line-height:1.1;margin-bottom:20px;}
.cta-subtext{font-size:14px;color:var(--mid);line-height:1.85;margin-bottom:28px;max-width:440px;margin-left:auto;margin-right:auto;}
.cta-subtext strong{color:var(--ink);}
.btn-cta{display:inline-block;background:var(--gold);color:#fff;font-size:15px;font-weight:500;padding:15px 36px;text-decoration:none;border-radius:2px;font-family:'Inter',sans-serif;}
.aditi-wrap{display:flex;justify-content:center;margin-top:28px;}
.aditi-card{display:flex;align-items:center;gap:14px;background:var(--bg);border:1px solid var(--border);padding:16px 20px;max-width:400px;width:100%;text-align:left;}
.aditi-photo{width:48px;height:48px;border-radius:50%;overflow:hidden;flex-shrink:0;border:2px solid var(--gold);object-fit:cover;}
.aditi-name{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:2px;}
.aditi-role{font-size:11px;color:var(--gold);margin-bottom:1px;}
.aditi-cred{font-size:10px;color:var(--light);}
.team-wrap{max-width:820px;margin:28px auto 0;border-top:1px solid var(--border);padding-top:24px;}
.team-eye{font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--light);margin-bottom:12px;text-align:center;}
.team-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;}
.team-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);background:var(--bg);}
.team-av{width:32px;height:32px;border-radius:50%;background:var(--gold-pale);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'EB Garamond',serif;font-size:12px;color:var(--gold);flex-shrink:0;}
.team-name{font-size:11px;font-weight:500;color:var(--ink);margin-bottom:1px;}
.team-role{font-size:10px;color:var(--gold);margin-bottom:1px;}
.team-cred{font-size:10px;color:var(--light);}

/* Inputs summary box */
.inputs-box{background:var(--bg-soft);border:1px solid var(--border);padding:20px 24px;margin-bottom:0;}
.inputs-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 24px;}
.input-row{display:flex;flex-direction:column;padding:6px 0;border-bottom:.5px solid var(--border);}
.input-lbl{font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--light);margin-bottom:2px;}
.input-val{font-size:13px;color:var(--ink);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Yocket <span>Elite</span></div>
    <div class="login-sub">Admin Access</div>
    <input type="password" class="login-input" id="pw" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()" />
    <button class="login-btn" onclick="doLogin()">Sign in</button>
    <p class="login-err" id="login-err">Incorrect password.</p>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen">
  <div class="admin-header">
    <div style="display:flex;align-items:center">
      <div class="admin-logo">Yocket <span>Elite</span></div>
      <span class="admin-tag">Admin</span>
    </div>
    <div>
      <button class="btn-dl" onclick="downloadCSV()">Download CSV</button>
      <button class="btn-logout" onclick="logout()">Sign out</button>
    </div>
  </div>
  <div class="admin-body">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num" id="stat-total">-</div><div class="stat-lbl">Total submissions</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-today">-</div><div class="stat-lbl">Today</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-week">-</div><div class="stat-lbl">This week</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-avg">-</div><div class="stat-lbl">Avg score</div></div>
    </div>
    <div class="table-wrap">
      <div class="table-top">
        <div class="table-title">All submissions</div>
        <input type="text" class="search-input" placeholder="Search name or email..." oninput="filterTable(this.value)" />
      </div>
      <div id="tbl-container"><div class="loading-state">Loading...</div></div>
    </div>
  </div>
</div>

<!-- REPORT MODAL -->
<div id="rpt-modal">
  <div class="modal-inner">
    <div class="modal-bar">
      <div class="modal-title" id="modal-title">Report</div>
      <div class="modal-acts">
        <button class="btn-print" onclick="printRpt()">Print / Save PDF</button>
        <button class="btn-close" onclick="closeModal()">Close</button>
      </div>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>

var SUPA_URL="https://mtwjsfttmzoecxdnqpcy.supabase.co";
var SUPA_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10d2pzZnR0bXpvZWN4ZG5xcGN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NzQ3NDYsImV4cCI6MjA5NjE1MDc0Nn0.zrYp_97_hUf4eoyGAJPWsxiqTh-33iYeXDhVu9rgYPU";
var allRows=[];

function doLogin(){
  if(document.getElementById("pw").value==="yocket2026"){
    document.getElementById("login-screen").style.display="none";
    document.getElementById("admin-screen").style.display="block";
    loadData();
  } else {
    document.getElementById("login-err").style.display="block";
  }
}

function logout(){
  document.getElementById("admin-screen").style.display="none";
  document.getElementById("login-screen").style.display="flex";
  document.getElementById("pw").value="";
}

async function loadData(){
  try{
    var res=await fetch(SUPA_URL+"/rest/v1/vs_submissions?select=*&order=created_at.desc",{
      headers:{"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY}
    });
    allRows=await res.json();
    renderStats(allRows);
    renderTable(allRows);
  }catch(e){
    document.getElementById("tbl-container").innerHTML="<div class=\"empty-state\">Error loading. Check console.</div>";
    console.error(e);
  }
}

function renderStats(rows){
  document.getElementById("stat-total").textContent=rows.length;
  var today=new Date().toISOString().slice(0,10);
  document.getElementById("stat-today").textContent=rows.filter(function(r){return(r.created_at||"").slice(0,10)===today;}).length;
  var weekAgo=new Date(Date.now()-7*24*60*60*1000).toISOString();
  document.getElementById("stat-week").textContent=rows.filter(function(r){return(r.created_at||"")>=weekAgo;}).length;
  if(rows.length){
    var avg=rows.reduce(function(s,r){return s+(r.overall_score||0);},0)/rows.length;
    document.getElementById("stat-avg").textContent=Math.round(avg)+"/100";
  }
}

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

    h+="<td title=\""+esc(r.target_universities)+"\">"+esc(r.target_universities)+"</td>";
    h+="<td>"+esc(r.intended_major)+"</td>";

function filterTable(q){
  if(!q.trim()){renderTable(allRows);return;}
  var lq=q.toLowerCase();
  renderTable(allRows.filter(function(r){
    return (r.name||"").toLowerCase().includes(lq)||(r.email||"").toLowerCase().includes(lq)||(r.school||"").toLowerCase().includes(lq);
  }));
}

function downloadCSV(){
  if(!allRows.length){alert("No submissions yet.");return;}
  var cols=["id","created_at","name","email","phone","grade","school","curriculum",
    "target_universities","intended_major","academic_standing","extracurriculars",
    "athletics","months_to_apply","overall_score","academic_score",
    "extracurricular_score","athletic_score","personal_score"];

/* SCORING - exact same logic as live site */
function dimTo100(raw){return Math.round(((4-raw)/3)*100);}
function intakeToMonths(intake){
  var map={"2027 intake":13,"2028 intake":25,"2029 intake":37,"2030 intake":49,"2031 intake":61,"Not sure yet":30};
  return map[intake]||30;
}

function calcScores(fd){
  var ac=3.5;
  if(fd.academic==="Top 5% of class")ac=2.5;
  else if(fd.academic==="Top 10-15%")ac=2.8;
  else if(fd.academic==="Top 25%")ac=3.2;
  else if(fd.academic==="Around the middle")ac=3.6;
  else ac=4.0;
  if(fd.awards==="Yes - national or international")ac=Math.max(2.2,ac-0.4);
  else if(fd.awards==="Yes - state or regional")ac=Math.max(2.5,ac-0.2);
  if(fd.curriculum==="IB")ac=Math.max(2.3,ac-0.15);
  ac=Math.max(ac,2.1);
  var ec=3.6;
  if(fd.leadership==="Yes - led something outside school")ec=2.4;
  else if(fd.leadership==="Yes - within school")ec=2.8;
  else if(fd.leadership==="In progress")ec=3.2;
  else ec=3.6;
  if(fd.awards==="Yes - national or international")ec=Math.max(2.1,ec-0.4);
  else if(fd.awards==="Yes - state or regional")ec=Math.max(2.4,ec-0.2);
  ec=Math.max(ec,2.1);
  var at=4.0;
  if(fd.sport==="Yes - national or state level")at=1.5;
  else if(fd.sport==="Yes - school or club level")at=3.0;
  else if(fd.sport==="Recreational only")at=3.5;
  var pe=3.2;
  if(fd.leadership==="Yes - led something outside school")pe=2.3;
  else if(fd.leadership==="Yes - within school")pe=2.7;
  else pe=3.2;
  pe=Math.max(pe,2.3);
  var months=intakeToMonths(fd.intake||"2029 intake");
  var score=100;
  score-=(ac-2.0)*18;
  score-=(ec-1.5)*16;
  score-=(pe-2.0)*14;
  if(at<=2.0)score=Math.min(score+6,100);
  if(months<=13)score=Math.max(score-10,22);
  else if(months<=25)score=Math.max(score-5,22);
  score=Math.round(Math.min(82,Math.max(28,score)));
  var verdict="Needs Urgent Work";
  if(score>=68)verdict="Competitive \u2014 gaps remain";
  else if(score>=52)verdict="Building \u2014 work needed";
  return{ac:ac,ec:ec,at:at,pe:pe,overall:score,verdict:verdict,months:months};
}

function viewReport(idx){
  var r=allRows[idx];
  if(!r)return;
  /* Reconstruct fd from saved data */
  var fd={
    name:r.name||"",
    grade:r.grade||"",
    school:r.school||"",
    curriculum:r.curriculum||"",
    targets:r.target_universities||"",
    major:r.intended_major||"",
    academic:r.academic_standing||"",
    awards:r.extracurriculars||"",
    eca:r.extracurriculars||"",
    leadership:r.extracurriculars||"Not yet",
    sport:r.athletics||"Not really",
    intake:r.months_to_apply||"2029 intake",
    parent:r.name||"",
    email:r.email||"",
    phone:r.phone||""
  };
  /* Use saved scores - more accurate than recalculating */
  var sc={
    ac:parseFloat(r.academic_score)||3.0,
    ec:parseFloat(r.extracurricular_score)||3.0,
    at:parseFloat(r.athletic_score)||4.0,
    pe:parseFloat(r.personal_score)||3.0,
    overall:r.overall_score||50,
    verdict:r.overall_score>=68?"Competitive \u2014 gaps remain":r.overall_score>=52?"Building \u2014 work needed":"Needs Urgent Work",
    months:intakeToMonths(r.months_to_apply||"2029 intake")
  };
  var content=buildContent(fd,sc);
  document.getElementById("modal-title").textContent="Report: "+fd.name;
  document.getElementById("modal-body").innerHTML=buildReportHTML(fd,sc,content);
  document.getElementById("rpt-modal").style.display="block";
  document.body.style.overflow="hidden";
}

}

function printRpt(){

  var w=window.open("","_blank");

/* BUILD CONTENT - same logic as live site, all double-quoted strings */
function buildContent(fd,sc){
  var name=fd.name,grade=fd.grade,school=fd.school,targets=fd.targets,major=fd.major,parent=fd.parent;
  var months=sc.months;
  var t1=(targets||"top universities").split(",")[0].trim();
  var intake=fd.intake||"2029 intake";
  var intakeDesc=months<=15?"This is a very tight window. Focus must be immediate and targeted.":
    months<=27?"A focused 2-year plan can still make a meaningful difference. Priorities must be set now.":
    "Enough runway to build a genuinely strong profile if the plan starts now.";
  var monthsWarn=months<=13?"Critical window. Decisions made now have immediate impact.":
    months<=25?"Each month of delay narrows what is achievable before applications open.":"";
  var contextText=name+" is a "+grade+" student at "+school+", targeting "+t1+" for "+major+" in the "+intake+". "+
    (months<=15?"The timeline is extremely compressed. T10 programmes see thousands of strong international applicants. The question is not what to add - it is what to make undeniable in the time remaining.":
    months<=27?"With just over two years to build, there is time to create real proof points - but only if the next decision about direction is made deliberately and acted on immediately.":
    "With "+months+" months until applications open, there is genuine runway to build something impressive. But runway only matters if it is used. The students who make it into the top 1% are almost never the ones who started late and sprinted - they are the ones who began early, built consistently, and arrived at application year with a file that tells one undeniable story.");
  var acBench=66,ecBench=83,peBench=66;
  var ac100=dimTo100(sc.ac),ec100=dimTo100(sc.ec),pe100=dimTo100(sc.pe);
  var dimProse={};
  var acGap=acBench-ac100;
  dimProse.ac=ac100>=acBench?
    "Academic standing is solid, but solid is not enough at the T10 level. What distinguishes the admits is external proof - a national Olympiad result, a selective programme, a competition where the jury has never heard of "+school+". That credential does not exist yet.":
    acGap<=15?"Good academic standing at "+school+". The gap to competitive level is "+acGap+" points - closeable through external validation. Top marks within school are necessary but not sufficient.":
    acGap<=30?"Academic performance is developing, but is currently "+acGap+" points below the competitive threshold. T10 programmes need evidence that a student can compete beyond their own institution.":
    "Academic performance needs significant work. At "+ac100+"/100 against a competitive benchmark of "+acBench+", this is the most important dimension to address.";
  var ecGap=ecBench-ec100;
  dimProse.ec=ec100>=ecBench?
    "Extracurricular involvement is strong relative to peers. However, the activities need to tell one coherent story that a reader in an Ivy admissions office can immediately understand and remember.":
    ecGap<=20?"Good extracurricular involvement with some leadership. The gap to competitive level is "+ecGap+" points. What bridges it is external recognition - someone outside "+school+" noticing the work.":
    ecGap<=35?"Activities are present but currently "+ecGap+" points below the competitive benchmark. There is no standout external recognition yet. One direction, taken seriously over 12-18 months, changes this.":
    "Extracurricular depth is the biggest gap at "+ecGap+" points below benchmark. Committing to one direction now and going deep - not adding more activities to a list - is the only path forward.";
  dimProse.pe=pe100>=peBench?
    "Personal maturity and sense of direction are visible. Ensure this translates explicitly into the essays - not as stated values, but as specific moments where character was tested and showed up.":
    "The personal dimension is "+(peBench-pe100)+" points below the competitive benchmark. Leadership experience and personal depth are still developing. The next period is about gaining real experiences that provide genuine essay material.";
  dimProse.at=sc.at<=2.0?
    "National-level athletic achievement is a real competitive advantage. Recruited athletes have a genuine edge. Coaches at target schools should be contacted directly.":
    sc.at<=3.0?"Active in sport at school or club level. For a "+major+" applicant this adds personal depth but is not a primary admissions lever.":
    "Limited structured athletic involvement. This is fine for a "+major+" applicant. Energy should go entirely to the dimensions that drive the admissions decision.";
  var narrative=fd.leadership.indexOf("Yes")!==-1?
    name+"&#39;s profile has visible leadership and extracurricular involvement - a real starting point. What is missing is the thread that connects them into one argument. Right now it reads as a capable, active student. What Ivy League programmes want to see is a student where everything - the activities, the academic choices, the personal essay - all answer the same underlying question.":
    "Right now "+name+"&#39;s profile reads as a student with interests - not yet a student with a direction. What T10 admissions officers want to see is specificity: not interested in technology but built something for real people and here is what happened. The transition from interested in to has done is the most important move in the next 12-18 months.";
  var pmf=months>=37?0.7:months>=25?0.55:months>=13?0.4:0.25;
  var pAc=Math.min(dimTo100(Math.max(sc.ac-pmf*0.6,2.0)),79);
  var pEc=Math.min(dimTo100(Math.max(sc.ec-pmf*0.9,1.8)),78);
  var pPe=Math.min(dimTo100(Math.max(sc.pe-pmf*0.5,2.1)),77);
  var actBody=months>=37?
    ("With "+months+" months of directed effort, "+name+" could arrive at applications with: one external credential at national level, a project with measurable real-world impact, and essays grounded in years of evidence. That profile would be genuinely competitive. It requires starting now."):
    ("In the available window, the highest-leverage move is to commit immediately to one direction and close the biggest gap. A focused, well-executed plan still produces meaningful improvement.");
  var waitBody="Delay is not neutral. Every month without a directed plan is a month the competition is building. Students who start in Grade 12 face compressed time for the same work - and compressed time produces thinner evidence.";
  var parentNote=parent+", "+name+" shows genuine promise - the "+(fd.leadership.indexOf("Yes")!==-1?"leadership experience and initiative":"curiosity and involvement")+" are real assets that admissions officers notice. The most critical gap right now is "+(ecGap>acGap?"extracurricular depth and external recognition":"academic credentials beyond the school")+" - this is what separates profiles that get noticed from those that do not. The single most useful thing is helping "+name+" commit to one clear direction and go deep on it, rather than spreading effort across many activities.";
  return{contextText:contextText,months:months,intake:intake,intakeDesc:intakeDesc,monthsWarn:monthsWarn,
    dimProse:dimProse,narrative:narrative,pAc:pAc,pEc:pEc,pPe:pPe,actBody:actBody,waitBody:waitBody,
    parentNote:parentNote,acBench:acBench,ecBench:ecBench,peBench:peBench,ac100:ac100,ec100:ec100,pe100:pe100};
}
